<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinTech — Loading post...</title>
  <meta name="theme-color" content="#16A34A">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="PinTech">
  <style>
    :root {
      --primary: #16A34A;
      --primary-hover: #15803D;
      --bg: #F9FAFB;
      --card-bg: #FFFFFF;
      --text: #111827;
      --text-muted: #6B7280;
      --radius: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header --- */
    .header {
      background: var(--card-bg);
      padding: 16px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .logo img { width: 32px; height: 32px; border-radius: 8px; }
    .header-cta {
      background: var(--primary);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
    }
    .header-cta:hover { background: var(--primary-hover); }

    /* --- Main --- */
    .main {
      flex: 1;
      max-width: 600px;
      width: 100%;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* --- Post Card --- */
    .post-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .badge-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .headline {
      font-size: 1.375rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 14px;
    }
    .summary {
      font-size: 1.0625rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 16px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #E5E7EB;
    }
    .source-link { color: var(--primary); text-decoration: none; font-weight: 500; }
    .source-link:hover { text-decoration: underline; }

    /* --- CTA Box --- */
    .cta-box {
      text-align: center;
      padding-top: 4px;
    }
    .cta-text {
      font-size: 0.9375rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .cta-btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .cta-btn:hover { background: var(--primary-hover); }
    .store-links {
      margin-top: 12px;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .store-links a { color: var(--primary); text-decoration: none; }
    .store-links a:hover { text-decoration: underline; }

    /* --- Loading & Error --- */
    .state-msg {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Footer --- */
    .footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .footer a { color: var(--text-muted); text-decoration: none; }
    .footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      .main { margin: 16px auto; }
      .post-card { padding: 20px 16px; }
      .headline { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">
      <img src="assets/icon.png" alt="PinTech" width="32" height="32">
      PinTech
    </a>
    <a href="index.html" class="header-cta">Learn More</a>
  </header>

  <main class="main" id="main">
    <div class="state-msg" id="loading">
      <div class="spinner"></div>
      Loading post...
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 PinTech News, LLC &middot;
    <a href="privacy-policy.html">Privacy</a> &middot;
    <a href="terms-of-service.html">Terms</a>
  </footer>

  <script>
  (function () {
    var SUPABASE_URL = 'https://gleiwdqnpsiaazawudqn.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZWl3ZHFucHNpYWF6YXd1ZHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODIxNDMsImV4cCI6MjA4Nzg1ODE0M30.ta1wLASZmzuJtQhcww0_ukAWyBt6zxxvXs2PxhLdbnY';

    var APP_STORE_LINK = 'https://apps.apple.com/app/id6760172402';
    var PLAY_STORE_LINK = 'https://play.google.com/store/apps/details?id=com.pintech.news';

    var CATEGORY_NAMES = {
      1: 'Politics', 2: 'Technology', 3: 'Sports',
      4: 'Entertainment', 5: 'Business', 6: 'Science', 7: 'World'
    };
    var CATEGORY_COLORS = {
      1: '#3B82F6', 2: '#8B5CF6', 3: '#F97316',
      4: '#EC4899', 5: '#14B8A6', 6: '#22C55E', 7: '#EF4444'
    };

    function timeAgo(dateStr) {
      var diff = Date.now() - new Date(dateStr).getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      var hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      var days = Math.floor(hrs / 24);
      return days + 'd ago';
    }

    function showError(msg) {
      document.getElementById('main').innerHTML =
        '<div class="state-msg">' + msg + '</div>';
    }

    function renderPost(post) {
      var catName = CATEGORY_NAMES[post.category_id] || 'News';
      var catColor = CATEGORY_COLORS[post.category_id] || '#6B7280';

      // Update page title and OG tags
      document.title = post.headline + ' — PinTech';

      var badges = '<span class="badge" style="background:' + catColor + '">' + catName + '</span>';
      if (post.is_breaking) {
        badges += '<span class="badge" style="background:#EF4444">BREAKING</span>';
      }

      var html =
        '<div class="post-card">' +
          '<div class="badge-row">' + badges + '</div>' +
          '<h1 class="headline">' + escapeHtml(post.headline) + '</h1>' +
          '<p class="summary">' + escapeHtml(post.summary) + '</p>' +
          '<div class="meta">' +
            '<a class="source-link" href="' + escapeHtml(post.source_url) + '" target="_blank" rel="noopener">' +
              escapeHtml(post.source_name) + ' &#x2197;' +
            '</a>' +
            '<span>' + timeAgo(post.published_at) + '</span>' +
          '</div>' +
          '<div class="cta-box">' +
            '<p class="cta-text">React, comment, and join the conversation on PinTech.</p>' +
            '<a class="cta-btn" href="' + APP_STORE_LINK + '">Get PinTech — Free</a>' +
            '<p class="store-links">' +
              '<a href="' + APP_STORE_LINK + '">App Store</a> &middot; ' +
              '<a href="' + PLAY_STORE_LINK + '">Google Play</a>' +
            '</p>' +
          '</div>' +
        '</div>';

      document.getElementById('main').innerHTML = html;
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // Get post ID from URL
    var params = new URLSearchParams(window.location.search);
    var postId = params.get('id');

    if (!postId) {
      showError('No post specified. <a href="index.html" style="color:#16A34A">Go to homepage</a>');
      return;
    }

    // Validate UUID format
    if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(postId)) {
      showError('Invalid post link. <a href="index.html" style="color:#16A34A">Go to homepage</a>');
      return;
    }

    // Fetch post from Supabase REST API
    fetch(SUPABASE_URL + '/rest/v1/news_posts?id=eq.' + postId + '&select=headline,summary,source_name,source_url,category_id,is_breaking,published_at', {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      }
    })
    .then(function (res) {
      if (!res.ok) throw new Error('Failed to load');
      return res.json();
    })
    .then(function (data) {
      if (!data || data.length === 0) {
        showError('Post not found. It may have been removed. <a href="index.html" style="color:#16A34A">Go to homepage</a>');
        return;
      }
      renderPost(data[0]);
    })
    .catch(function () {
      showError('Something went wrong. <a href="index.html" style="color:#16A34A">Try again</a>');
    });
  })();
  </script>
</body>
</html>
